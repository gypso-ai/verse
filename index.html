<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1a1a1a" />
<title>泰坦遗种 · 阅读器</title>
<style>
  :root {
    --bg: #f4efe6;
    --bg-elev: #ebe4d6;
    --fg: #2b2620;
    --fg-soft: #6b6357;
    --accent: #a8632b;
    --accent-soft: #d8b070;
    --border: rgba(0, 0, 0, 0.12);
    --shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
    --content-max: 720px;
    --font-size: 18px;
    --line-height: 1.85;
  }
  html.dark {
    --bg: #14130f;
    --bg-elev: #1d1c17;
    --fg: #d8d4c2;
    --fg-soft: #8a8270;
    --accent: #d8b070;
    --accent-soft: #a8632b;
    --border: rgba(255, 255, 255, 0.08);
    --shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
  }
  html.sepia {
    --bg: #f1e7d0;
    --bg-elev: #e8dcc0;
    --fg: #4a3a26;
    --fg-soft: #7a6b50;
    --accent: #8a4a1c;
    --accent-soft: #b8782b;
    --border: rgba(74, 58, 38, 0.18);
    --shadow: 0 6px 24px rgba(74, 58, 38, 0.1);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", "STSong",
                 "Times New Roman", Georgia, "Microsoft YaHei", "PingFang SC", serif;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
    transition: background 0.25s ease, color 0.25s ease;
  }
  body {
    min-height: 100vh;
    overscroll-behavior-y: none;
  }

  /* ---------- Top bar ---------- */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    padding-top: calc(10px + env(safe-area-inset-top));
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: saturate(180%) blur(10px);
    -webkit-backdrop-filter: saturate(180%) blur(10px);
    border-bottom: 1px solid var(--border);
    font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", system-ui, sans-serif;
  }
  .topbar .title {
    flex: 1;
    min-width: 0;
    font-size: 14px;
    color: var(--fg-soft);
    letter-spacing: 1px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .topbar .title b { color: var(--fg); font-weight: 600; }
  .icon-btn {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--bg-elev);
    color: var(--fg);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    line-height: 1;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    flex: 0 0 auto;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn:active { transform: scale(0.96); }
  .icon-btn svg { width: 18px; height: 18px; }

  /* ---------- Drawer (TOC) ---------- */
  .drawer-mask {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.35);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    z-index: 60;
  }
  .drawer-mask.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    width: min(320px, 86vw);
    background: var(--bg-elev);
    border-right: 1px solid var(--border);
    z-index: 61;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow);
  }
  .drawer.open { transform: translateX(0); }
  .drawer header {
    padding: 14px 16px;
    padding-top: calc(14px + env(safe-area-inset-top));
    border-bottom: 1px solid var(--border);
    font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    font-size: 13px;
    color: var(--fg-soft);
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .drawer header b { color: var(--fg); font-weight: 600; letter-spacing: 1px; }
  .book-switcher {
    display: flex;
    gap: 6px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  .book-switcher button {
    flex: 1;
    appearance: none;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--fg);
    padding: 8px 10px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }
  .book-switcher button.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .toc {
    flex: 1;
    overflow-y: auto;
    padding: 8px 4px 16px;
    font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.55;
  }
  .toc a {
    display: block;
    padding: 7px 14px;
    color: var(--fg);
    text-decoration: none;
    border-left: 3px solid transparent;
    word-break: break-word;
  }
  .toc a:hover { background: color-mix(in srgb, var(--accent) 14%, transparent); }
  .toc a.active {
    border-left-color: var(--accent);
    color: var(--accent);
    background: color-mix(in srgb, var(--accent) 10%, transparent);
  }
  .toc a.lvl-1 { font-weight: 600; padding-left: 14px; }
  .toc a.lvl-2 { padding-left: 26px; }
  .toc a.lvl-3 { padding-left: 38px; color: var(--fg-soft); font-size: 13px; }
  .toc-empty {
    padding: 20px 16px;
    color: var(--fg-soft);
    font-size: 13px;
    text-align: center;
  }

  /* ---------- Settings popover ---------- */
  .settings {
    position: fixed;
    top: 60px;
    right: 12px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    box-shadow: var(--shadow);
    z-index: 55;
    display: none;
    min-width: 220px;
    font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    font-size: 13px;
  }
  .settings.open { display: block; }
  .settings .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 6px 2px;
  }
  .settings .row + .row { border-top: 1px dashed var(--border); }
  .settings .label { color: var(--fg-soft); }
  .seg {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .seg button {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--fg);
    padding: 6px 10px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    min-width: 36px;
  }
  .seg button + button { border-left: 1px solid var(--border); }
  .seg button.active { background: var(--accent); color: #fff; }

  /* ---------- Reading content ---------- */
  main {
    max-width: var(--content-max);
    margin: 0 auto;
    padding: 28px 22px 120px;
    font-size: var(--font-size);
    line-height: var(--line-height);
  }
  main.loading { color: var(--fg-soft); text-align: center; padding-top: 40vh; }
  main h1, main h2, main h3 {
    font-family: "Microsoft YaHei", "PingFang SC", "Source Han Serif SC", system-ui, sans-serif;
    line-height: 1.4;
    color: var(--fg);
    scroll-margin-top: 70px;
  }
  main h1 {
    font-size: 1.8em;
    text-align: center;
    margin: 1.6em 0 1em;
    padding-bottom: 0.4em;
    border-bottom: 1px solid var(--border);
    letter-spacing: 4px;
  }
  main h2 {
    font-size: 1.35em;
    margin: 2em 0 0.8em;
    color: var(--accent);
    letter-spacing: 2px;
  }
  main h3 {
    font-size: 1.1em;
    margin: 1.6em 0 0.6em;
    color: var(--fg);
  }
  main p { margin: 0 0 1em; text-indent: 2em; }
  main blockquote {
    margin: 1.2em 0;
    padding: 0.6em 1em;
    border-left: 3px solid var(--accent);
    background: color-mix(in srgb, var(--accent) 8%, transparent);
    color: var(--fg-soft);
    border-radius: 0 6px 6px 0;
  }
  main blockquote p { text-indent: 0; margin: 0.3em 0; }
  main hr {
    border: 0;
    height: 1px;
    background: var(--border);
    margin: 2em auto;
    width: 60%;
  }
  main ul, main ol { padding-left: 1.6em; margin: 0.6em 0 1.2em; }
  main li { margin: 0.3em 0; }
  main em { font-style: italic; color: var(--accent); }
  main strong { color: var(--fg); font-weight: 700; }
  main code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    background: var(--bg-elev);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 0.9em;
  }
  main a { color: var(--accent); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 2px; }

  /* tables (for the README/operation tables if used) */
  main table {
    border-collapse: collapse;
    margin: 1em auto;
    font-size: 0.95em;
  }
  main th, main td {
    border: 1px solid var(--border);
    padding: 6px 12px;
  }
  main th { background: var(--bg-elev); }

  /* ---------- Reading progress bar ---------- */
  #progress {
    position: fixed;
    left: 0;
    top: 0;
    height: 2px;
    background: var(--accent);
    width: 0%;
    z-index: 70;
    transition: width 0.1s linear;
  }

  /* ---------- Back-to-top ---------- */
  #toTop {
    position: fixed;
    right: 16px;
    bottom: calc(20px + env(safe-area-inset-bottom));
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    z-index: 40;
  }
  #toTop.show { opacity: 0.85; pointer-events: auto; }
  #toTop:hover { opacity: 1; }

  @media (max-width: 600px) {
    main { padding: 18px 16px 120px; }
    .topbar .title { font-size: 13px; letter-spacing: 0; }
  }
</style>
</head>
<body>

<div id="progress"></div>

<header class="topbar">
  <button class="icon-btn" id="btnToc" aria-label="目录" title="目录">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
  </button>
  <div class="title" id="bookTitle"><b>泰坦遗种</b> · 阅读器</div>
  <button class="icon-btn" id="btnSettings" aria-label="设置" title="设置">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
</header>

<!-- Settings popover -->
<div class="settings" id="settings">
  <div class="row">
    <span class="label">主题</span>
    <div class="seg" id="segTheme">
      <button data-theme="light">日</button>
      <button data-theme="sepia">纸</button>
      <button data-theme="dark">夜</button>
    </div>
  </div>
  <div class="row">
    <span class="label">字号</span>
    <div class="seg" id="segFont">
      <button data-font="16">小</button>
      <button data-font="18">中</button>
      <button data-font="20">大</button>
      <button data-font="22">特</button>
    </div>
  </div>
  <div class="row">
    <span class="label">行距</span>
    <div class="seg" id="segLine">
      <button data-line="1.65">紧</button>
      <button data-line="1.85">中</button>
      <button data-line="2.1">松</button>
    </div>
  </div>
</div>

<!-- TOC drawer -->
<div class="drawer-mask" id="drawerMask"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <header><b>目录</b><span id="bookSubtitle"></span></header>
  <div class="book-switcher" id="bookSwitcher">
    <!-- buttons injected by JS -->
  </div>
  <nav class="toc" id="toc"></nav>
</aside>

<main id="content" class="loading">载入中…</main>

<button class="icon-btn" id="toTop" aria-label="回到顶部" title="回到顶部">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<script>
(() => {
  'use strict';

  // ---------- Books ----------
  const BOOKS = [
    { id: 'short', file: '泰坦遗种_短篇.md', label: '短篇', title: '泰坦遗种 · 短篇' },
    { id: 'long',  file: '泰坦遗种_长篇.md', label: '长篇', title: '泰坦遗种 · 长篇' },
  ];

  // ---------- Storage helpers ----------
  const LS = {
    get(k, d) { try { const v = localStorage.getItem(k); return v == null ? d : JSON.parse(v); } catch { return d; } },
    set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  };

  // ---------- Minimal Markdown renderer ----------
  // Supports: # h1..###### h6, > blockquote (multi-line), --- hr, ordered/unordered lists,
  // **bold**, *italic*, `code`, [text](href), and paragraphs. Tailored to these novels.
  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function renderInline(text) {
    // Inline code first to protect its content
    const codes = [];
    text = text.replace(/`([^`]+)`/g, (_, c) => {
      codes.push(c);
      return `\u0000C${codes.length - 1}\u0000`;
    });
    text = escapeHtml(text);
    // Links [text](url)
    text = text.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_, t, u) =>
      `<a href="${u}">${t}</a>`);
    // Bold **x**
    text = text.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
    // Italic *x*  (avoid matching ** which is already handled)
    text = text.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
    // Restore code
    text = text.replace(/\u0000C(\d+)\u0000/g, (_, i) =>
      `<code>${escapeHtml(codes[+i])}</code>`);
    return text;
  }
  function render(md) {
    // Normalize line endings, drop BOM
    md = md.replace(/^\uFEFF/, '').replace(/\r\n?/g, '\n');
    const lines = md.split('\n');
    const out = [];
    let i = 0;
    const headings = [];
    let hCounter = 0;

    const flushParagraph = (buf) => {
      if (!buf.length) return;
      out.push(`<p>${renderInline(buf.join(' ').trim())}</p>`);
    };

    while (i < lines.length) {
      let line = lines[i];

      // Blank line
      if (/^\s*$/.test(line)) { i++; continue; }

      // Heading
      const mh = /^(#{1,6})\s+(.*?)\s*#*\s*$/.exec(line);
      if (mh) {
        const level = mh[1].length;
        const text = mh[2];
        const id = `h-${++hCounter}`;
        headings.push({ id, level, text });
        out.push(`<h${level} id="${id}">${renderInline(text)}</h${level}>`);
        i++;
        continue;
      }

      // Horizontal rule
      if (/^\s*(?:---|\*\*\*|___)\s*$/.test(line)) {
        out.push('<hr/>');
        i++;
        continue;
      }

      // Blockquote (collect consecutive `> ` lines)
      if (/^\s*>\s?/.test(line)) {
        const buf = [];
        while (i < lines.length && /^\s*>\s?/.test(lines[i])) {
          buf.push(lines[i].replace(/^\s*>\s?/, ''));
          i++;
        }
        // Recursively render inner content as paragraphs (keep blank-line splits)
        const inner = buf.join('\n').split(/\n{2,}/)
          .map(s => s.trim()).filter(Boolean)
          .map(s => `<p>${renderInline(s.replace(/\n/g, ' '))}</p>`)
          .join('');
        out.push(`<blockquote>${inner}</blockquote>`);
        continue;
      }

      // Unordered list
      if (/^\s*[-*+]\s+/.test(line)) {
        const items = [];
        while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) {
          items.push(lines[i].replace(/^\s*[-*+]\s+/, ''));
          i++;
        }
        out.push('<ul>' + items.map(it => `<li>${renderInline(it)}</li>`).join('') + '</ul>');
        continue;
      }

      // Ordered list
      if (/^\s*\d+\.\s+/.test(line)) {
        const items = [];
        while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
          items.push(lines[i].replace(/^\s*\d+\.\s+/, ''));
          i++;
        }
        out.push('<ol>' + items.map(it => `<li>${renderInline(it)}</li>`).join('') + '</ol>');
        continue;
      }

      // Paragraph (collect until blank line / structural marker)
      const para = [];
      while (
        i < lines.length &&
        !/^\s*$/.test(lines[i]) &&
        !/^#{1,6}\s+/.test(lines[i]) &&
        !/^\s*>\s?/.test(lines[i]) &&
        !/^\s*(?:---|\*\*\*|___)\s*$/.test(lines[i]) &&
        !/^\s*[-*+]\s+/.test(lines[i]) &&
        !/^\s*\d+\.\s+/.test(lines[i])
      ) {
        para.push(lines[i]);
        i++;
      }
      flushParagraph(para);
    }

    return { html: out.join('\n'), headings };
  }

  // ---------- DOM refs ----------
  const $ = (sel) => document.querySelector(sel);
  const content = $('#content');
  const drawer = $('#drawer');
  const drawerMask = $('#drawerMask');
  const tocEl = $('#toc');
  const settingsEl = $('#settings');
  const bookTitleEl = $('#bookTitle');
  const bookSubEl = $('#bookSubtitle');
  const switcherEl = $('#bookSwitcher');
  const progressBar = $('#progress');
  const toTopBtn = $('#toTop');

  // ---------- State ----------
  const state = {
    bookId: LS.get('reader.book', 'short'),
    theme: LS.get('reader.theme', 'sepia'),
    fontSize: LS.get('reader.font', 18),
    lineHeight: LS.get('reader.line', 1.85),
    headings: [],
  };

  // ---------- Build switcher ----------
  function buildSwitcher() {
    switcherEl.innerHTML = '';
    BOOKS.forEach(b => {
      const btn = document.createElement('button');
      btn.textContent = b.label;
      btn.className = b.id === state.bookId ? 'active' : '';
      btn.onclick = () => loadBook(b.id);
      switcherEl.appendChild(btn);
    });
  }

  // ---------- Theme / font ----------
  function applyTheme() {
    const root = document.documentElement;
    root.classList.remove('dark', 'sepia');
    if (state.theme === 'dark') root.classList.add('dark');
    else if (state.theme === 'sepia') root.classList.add('sepia');
    document.querySelectorAll('#segTheme button').forEach(b =>
      b.classList.toggle('active', b.dataset.theme === state.theme));
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content',
      state.theme === 'dark' ? '#14130f' :
      state.theme === 'sepia' ? '#f1e7d0' : '#f4efe6');
  }
  function applyFont() {
    document.documentElement.style.setProperty('--font-size', state.fontSize + 'px');
    document.documentElement.style.setProperty('--line-height', String(state.lineHeight));
    document.querySelectorAll('#segFont button').forEach(b =>
      b.classList.toggle('active', +b.dataset.font === +state.fontSize));
    document.querySelectorAll('#segLine button').forEach(b =>
      b.classList.toggle('active', Math.abs(+b.dataset.line - state.lineHeight) < 0.01));
  }

  // ---------- Book loading ----------
  async function loadBook(id) {
    const book = BOOKS.find(b => b.id === id) || BOOKS[0];
    state.bookId = book.id;
    LS.set('reader.book', book.id);
    bookTitleEl.innerHTML = `<b>${book.title.split(' · ')[0]}</b> · ${book.label}`;
    bookSubEl.textContent = book.label;
    buildSwitcher();
    content.classList.add('loading');
    content.textContent = '载入中…';
    tocEl.innerHTML = '<div class="toc-empty">载入中…</div>';
    try {
      // Cache-bust on hard reload but allow caching otherwise
      const res = await fetch(book.file, { cache: 'default' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const md = await res.text();
      const { html, headings } = render(md);
      state.headings = headings;
      content.classList.remove('loading');
      content.innerHTML = html;
      buildToc(headings);
      // Restore scroll position
      const savedPos = LS.get('reader.pos.' + book.id, 0);
      // Wait a frame so layout is ready
      requestAnimationFrame(() => window.scrollTo(0, savedPos || 0));
      updateProgress();
    } catch (err) {
      content.classList.remove('loading');
      content.innerHTML = `
        <h1>无法加载文件</h1>
        <p>载入 <code>${book.file}</code> 失败：${escapeHtml(String(err.message || err))}</p>
        <blockquote><p>如果你是直接用浏览器打开 <code>index.html</code>（<code>file://</code> 协议），
        浏览器出于安全限制可能会拒绝读取本地文件。请改用一个本地静态服务器，例如：</p>
        <p><code>python3 -m http.server 8000</code></p>
        <p>然后访问 <code>http://localhost:8000/</code>。</p></blockquote>
      `;
      tocEl.innerHTML = '<div class="toc-empty">载入失败</div>';
    }
  }

  // ---------- TOC ----------
  function buildToc(headings) {
    if (!headings.length) {
      tocEl.innerHTML = '<div class="toc-empty">本书暂无标题</div>';
      return;
    }
    const minLevel = Math.min(...headings.map(h => h.level));
    tocEl.innerHTML = headings.map(h => {
      const lvl = Math.min(3, h.level - minLevel + 1);
      return `<a href="#${h.id}" data-id="${h.id}" class="lvl-${lvl}">${escapeHtml(h.text)}</a>`;
    }).join('');
    tocEl.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        const tgt = document.getElementById(a.dataset.id);
        if (tgt) {
          const top = tgt.getBoundingClientRect().top + window.scrollY - 60;
          window.scrollTo({ top, behavior: 'smooth' });
        }
        closeDrawer();
      });
    });
  }
  function updateActiveToc() {
    if (!state.headings.length) return;
    const y = window.scrollY + 80;
    let activeId = state.headings[0].id;
    for (const h of state.headings) {
      const el = document.getElementById(h.id);
      if (!el) continue;
      if (el.offsetTop <= y) activeId = h.id;
      else break;
    }
    tocEl.querySelectorAll('a').forEach(a =>
      a.classList.toggle('active', a.dataset.id === activeId));
  }

  // ---------- Drawer ----------
  function openDrawer() {
    drawer.classList.add('open');
    drawerMask.classList.add('open');
    drawer.setAttribute('aria-hidden', 'false');
    // Scroll active item into view
    const active = tocEl.querySelector('a.active');
    if (active) active.scrollIntoView({ block: 'center' });
  }
  function closeDrawer() {
    drawer.classList.remove('open');
    drawerMask.classList.remove('open');
    drawer.setAttribute('aria-hidden', 'true');
  }

  // ---------- Progress ----------
  function updateProgress() {
    const h = document.documentElement;
    const max = (h.scrollHeight - h.clientHeight) || 1;
    const pct = Math.min(100, Math.max(0, (window.scrollY / max) * 100));
    progressBar.style.width = pct + '%';
    toTopBtn.classList.toggle('show', window.scrollY > 600);
    LS.set('reader.pos.' + state.bookId, Math.round(window.scrollY));
  }

  // ---------- Wire up events ----------
  $('#btnToc').addEventListener('click', () => {
    if (drawer.classList.contains('open')) closeDrawer();
    else openDrawer();
  });
  drawerMask.addEventListener('click', closeDrawer);

  $('#btnSettings').addEventListener('click', (e) => {
    e.stopPropagation();
    settingsEl.classList.toggle('open');
  });
  document.addEventListener('click', (e) => {
    if (settingsEl.classList.contains('open') &&
        !settingsEl.contains(e.target) &&
        e.target.id !== 'btnSettings' &&
        !e.target.closest('#btnSettings')) {
      settingsEl.classList.remove('open');
    }
  });

  document.querySelectorAll('#segTheme button').forEach(b => {
    b.addEventListener('click', () => {
      state.theme = b.dataset.theme;
      LS.set('reader.theme', state.theme);
      applyTheme();
    });
  });
  document.querySelectorAll('#segFont button').forEach(b => {
    b.addEventListener('click', () => {
      state.fontSize = +b.dataset.font;
      LS.set('reader.font', state.fontSize);
      applyFont();
    });
  });
  document.querySelectorAll('#segLine button').forEach(b => {
    b.addEventListener('click', () => {
      state.lineHeight = +b.dataset.line;
      LS.set('reader.line', state.lineHeight);
      applyFont();
    });
  });

  toTopBtn.addEventListener('click', () =>
    window.scrollTo({ top: 0, behavior: 'smooth' }));

  // Throttle scroll
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        updateProgress();
        updateActiveToc();
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });

  // Keyboard shortcuts
  window.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'Escape') { closeDrawer(); settingsEl.classList.remove('open'); }
    if (e.key === 't' || e.key === 'T') {
      const order = ['light', 'sepia', 'dark'];
      state.theme = order[(order.indexOf(state.theme) + 1) % order.length];
      LS.set('reader.theme', state.theme);
      applyTheme();
    }
  });

  // ---------- Init ----------
  applyTheme();
  applyFont();
  buildSwitcher();
  loadBook(state.bookId);
})();
</script>
</body>
</html>
